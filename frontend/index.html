<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Offline Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fafafa; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; }
        h2 { color: #111; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; }
        button { background: #000; color: #fff; border: none; padding: 0.8rem 2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: background 0.2s; width: 100%; }
        button:hover { background: #333; }
        #status { margin-top: 1rem; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Offline Email Alert Test</h2>
        <p>Click below to test if your active Render backend can send an email. Later, you can shut down Render to test the Firebase offline hook.</p>
        <button id="sendBtn">Trigger Render Email</button>
        <div id="status"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
